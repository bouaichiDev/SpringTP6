<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="max-w-5xl mx-auto px-4 py-12">
        <div class="flex items-center justify-between mb-8">
            <div>
                <h1 class="text-3xl font-bold text-gray-900">Users</h1>
                <p class="text-gray-500 mt-1">Manage your users list</p>
            </div>
            <a href="/signup" class="inline-flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white font-medium px-5 py-2.5 rounded-lg transition-colors shadow-sm">
                <i class="fa-solid fa-plus"></i>
                Add User
            </a>
        </div>

        <div th:switch="${users}" class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
            <div th:case="null" class="p-12 text-center">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-gray-100 mb-4">
                    <i class="fa-solid fa-users text-gray-400 text-2xl"></i>
                </div>
                <h3 class="text-lg font-semibold text-gray-900 mb-1">No users yet</h3>
                <p class="text-gray-500 mb-6">Get started by adding your first user.</p>
                <a href="/signup" class="inline-flex items-center gap-2 text-indigo-600 hover:text-indigo-700 font-medium">
                    <i class="fa-solid fa-plus"></i>
                    Add a new user
                </a>
            </div>

            <div th:case="*">
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-gray-50 border-b border-gray-200">
                            <tr>
                                <th class="px-6 py-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">Name</th>
                                <th class="px-6 py-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">Email</th>
                                <th class="px-6 py-4 text-xs font-semibold text-gray-500 uppercase tracking-wider text-center">Actions</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-100">
                            <tr th:each="user : ${users}" class="hover:bg-gray-50 transition-colors">
                                <td class="px-6 py-4">
                                    <div class="flex items-center gap-3">
                                        <div class="w-9 h-9 rounded-full bg-indigo-100 text-indigo-600 flex items-center justify-center text-sm font-semibold" th:text="${#strings.substring(user.name, 0, 1)}">
                                        </div>
                                        <span class="font-medium text-gray-900" th:text="${user.name}"></span>
                                    </div>
                                </td>
                                <td class="px-6 py-4 text-gray-600" th:text="${user.email}"></td>
                                <td class="px-6 py-4">
                                    <div class="flex items-center justify-center gap-2">
                                        <a th:href="@{/edit/{id}(id=${user.id})}" class="inline-flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium text-indigo-600 hover:text-white hover:bg-indigo-600 rounded-md transition-all border border-indigo-200 hover:border-indigo-600">
                                            <i class="fa-solid fa-pen text-xs"></i>
                                            Edit
                                        </a>
                                        <a th:href="@{/delete/{id}(id=${user.id})}" onclick="return confirm('Are you sure you want to delete this user?')" class="inline-flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium text-red-600 hover:text-white hover:bg-red-600 rounded-md transition-all border border-red-200 hover:border-red-600">
                                            <i class="fa-solid fa-trash text-xs"></i>
                                            Delete
                                        </a>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
